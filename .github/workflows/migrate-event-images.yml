name: Migrate event images to static assets

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Image category to migrate"
        required: true
        default: "events"
        type: choice
        options:
          - "events"
          - "house-events"
      apply:
        description: "Apply changes (download images, update DB). Default false = dry run."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      event_id:
        description: "Optional: migrate a single event by UUID (events category only)"
        required: false
        type: string
      house_event_id:
        description: "Optional: migrate a single House event by UUID (house-events category only)"
        required: false
        type: string
      limit:
        description: "Max number of event rows to process (default: 20)"
        required: false
        default: "20"
        type: string
  repository_dispatch:
    types: [event-image-migration-requested, house-event-image-migration-requested]

# Prevent duplicate migrations for the same event. Different events run independently.
# Falls back to 'batch' for manual runs with no event_id.
concurrency:
  group: event-image-migration-${{ github.event_name == 'repository_dispatch' && (github.event.client_payload.event_id || github.event.client_payload.house_event_id) || inputs.event_id || inputs.house_event_id || 'batch' }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Guard — apply mode must run on main
        # repository_dispatch always runs in apply mode; manual apply= true also guarded here.
        if: ${{ (inputs.apply == 'true' || github.event_name == 'repository_dispatch') && github.ref != 'refs/heads/main' }}
        run: |
          echo "ERROR: Apply mode is only allowed on the main branch."
          echo "Current ref: ${{ github.ref }}"
          echo "Updating DB URLs before the files are deployed on main can temporarily"
          echo "break production event images."
          exit 1

      - name: Build migration args
        id: args
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            CATEGORY="${{ github.event.client_payload.category || 'events' }}"
            EVENT_ID="${{ github.event.client_payload.event_id }}"
            HOUSE_EVENT_ID="${{ github.event.client_payload.house_event_id }}"
            APPLY_MODE="true"
            LIMIT="1"
          else
            CATEGORY="${{ inputs.category }}"
            EVENT_ID="${{ inputs.event_id }}"
            HOUSE_EVENT_ID="${{ inputs.house_event_id }}"
            APPLY_MODE="${{ inputs.apply }}"
            LIMIT="${{ inputs.limit || '20' }}"
          fi

          ARGS="--category $CATEGORY"
          if [ -n "$EVENT_ID" ]; then
            ARGS="$ARGS --event-id $EVENT_ID"
          fi
          if [ -n "$HOUSE_EVENT_ID" ]; then
            ARGS="$ARGS --house-event-id $HOUSE_EVENT_ID"
          fi
          if [ -n "$LIMIT" ]; then
            ARGS="$ARGS --limit $LIMIT"
          fi
          if [ "$APPLY_MODE" = "true" ]; then
            ARGS="$ARGS --apply"
          fi

          echo "MIGRATION_ARGS=$ARGS" >> "$GITHUB_OUTPUT"
          echo "APPLY_MODE=$APPLY_MODE" >> "$GITHUB_OUTPUT"
          echo "CATEGORY=$CATEGORY" >> "$GITHUB_OUTPUT"

      - name: Run migration
        env:
          REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/migrate-supabase-images-to-public.ts ${{ steps.args.outputs.MIGRATION_ARGS }}

      - name: Commit and push migrated images
        if: ${{ steps.args.outputs.APPLY_MODE == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage specific category directory
          if [ "${{ steps.args.outputs.CATEGORY }}" = "house-events" ]; then
            git add public/images/house-events/
          else
            git add public/images/events/
          fi
          
          if git diff --cached --quiet; then
            echo "No new image files to commit."
          else
            git commit -m "chore: migrate ${{ steps.args.outputs.CATEGORY }} images to static assets [skip ci]"
            git push
          fi
