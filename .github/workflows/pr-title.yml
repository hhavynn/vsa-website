name: "PR Title Check"

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          node -e '
            const title = process.env.PR_TITLE;
            const regex = /^(feat|fix|chore|docs|refactor|test|style|perf|ci|build|revert|security)(\([a-z0-9-]+\))?!?: .+/;
            
            console.log(`Checking PR Title: "${title}"`);
            
            if (!regex.test(title)) {
              console.error(`::error::PR title "${title}" does not follow the Conventional Commits specification.`);
              console.error("");
              console.error("Allowed types:");
              console.error("  feat, fix, chore, docs, refactor, test, style, perf, ci, build, revert, security");
              console.error("");
              console.error("Examples of valid titles:");
              console.error("  - feat: add Ask VSA suggestions");
              console.error("  - fix: prevent photo request spam");
              console.error("  - chore: refresh Graphify workflow");
              console.error("  - docs: update admin runbook");
              console.error("  - ci: add PR title check");
              console.error("  - feat(ai): improve Ask VSA chat");
              console.error("  - fix!: remove deprecated backend");
              console.error("");
              console.error("Please update the PR title to follow this standard.");
              process.exit(1);
            }
            console.log("PR title is valid!");
          '
